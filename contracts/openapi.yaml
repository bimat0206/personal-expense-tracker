                items:
                  $ref: '#/components/schemas/IncomeSource'
        '400':
          description: Bad Request
        '428':
          description: Precondition Required
      operationId: getIncome-sources
    post:
      summary: Create income-sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: &id002
                name:
                  type: string
                color:
                  type: string
                icon:
                  type: string
                sortOrder:
                  type: integer
              required:
              - name
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeSource'
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: postIncome-sources
  /api/income-sources/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Update income-sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: *id002
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeSource'
        '404':
          description: Not Found
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: putIncome-sourcesId
    delete:
      summary: Hard delete income-sources
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: deleteIncome-sourcesId
  /api/income-sources/{id}/archive:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Archive income-sources
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeSource'
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: postIncome-sourcesIdArchive
  /api/income-sources/{id}/unarchive:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Unarchive income-sources
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeSource'
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: postIncome-sourcesIdUnarchive
  /api/payment-methods:
    get:
      summary: List payment-methods
      parameters:
      - name: includeArchived
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethod'
        '400':
          description: Bad Request
        '428':
          description: Precondition Required
      operationId: getPayment-methods
    post:
      summary: Create payment-methods
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: &id003
                name:
                  type: string
                type:
                  type: string
                sortOrder:
                  type: integer
              required:
              - name
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: postPayment-methods
  /api/payment-methods/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
