openapi: 3.0.3
info:
  title: Personal Expense Tracker API
  version: 1.0.0
  description: Local REST API for the Personal Expense Tracker
  license:
    name: MIT
servers:
- url: http://localhost:3000
  description: Local backend
components:
  schemas:
    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum:
          - expense
          - income
        date:
          type: string
          format: date
        amountCents:
          type: integer
        categoryId:
          type: integer
          nullable: true
        incomeSourceId:
          type: integer
          nullable: true
        paymentMethodId:
          type: integer
        note:
          type: string
          maxLength: 500
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        attachmentId:
          type: string
          nullable: true
        recurringRuleId:
          type: integer
          nullable: true
        occurrenceDate:
          type: string
          format: date
          nullable: true
      required:
      - id
      - type
      - date
      - amountCents
      - paymentMethodId
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        sortOrder:
          type: integer
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - name
      - sortOrder
      - archived
    IncomeSource:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        sortOrder:
          type: integer
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - name
      - sortOrder
      - archived
    PaymentMethod:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          nullable: true
          enum:
          - cash
          - credit
          - debit
          - bank_transfer
          - other
        sortOrder:
          type: integer
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - name
      - sortOrder
      - archived
    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          nullable: true
        sortOrder:
          type: integer
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - name
      - sortOrder
      - archived
    TopExpenseItem:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        amountCents:
          type: integer
        categoryId:
          type: integer
        note:
          type: string
          nullable: true
      required:
      - id
      - date
      - amountCents
      - categoryId
    WishListItem:
      type: object
      properties:
        id:
          type: integer
        month:
          type: integer
        year:
          type: integer
        name:
          type: string
        estimatedCostCents:
          type: integer
        categoryId:
          type: integer
        priority:
          type: string
          enum:
          - high
          - medium
          - low
        note:
          type: string
          maxLength: 500
          nullable: true
        status:
          type: string
          enum:
          - planned
          - purchased
          - abandoned
        linkedTransactionId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - month
      - year
      - name
      - estimatedCostCents
      - categoryId
      - priority
      - status
    RecurringRule:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum:
          - expense
          - income
        amountCents:
          type: integer
        categoryId:
          type: integer
          nullable: true
        incomeSourceId:
          type: integer
          nullable: true
        paymentMethodId:
          type: integer
        frequency:
          type: string
          enum:
          - weekly
          - monthly
          - yearly
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - type
      - amountCents
      - paymentMethodId
      - frequency
      - startDate
      - active
    AppSettings:
      type: object
      properties:
        currencyCode:
          type: string
        topExpensesCount:
          type: integer
        backupReminderThresholdDays:
          type: integer
      required:
      - currencyCode
      - topExpensesCount
      - backupReminderThresholdDays
    Attachment:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
        transactionId:
          type: integer
      required:
      - id
      - filename
      - mimeType
      - sizeBytes
      - transactionId
    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
      required:
      - error
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  dbConnected:
                    type: boolean
        '503':
          description: Service Unavailable
        '400':
          description: Bad Request
      operationId: getHealth
  /api/transactions:
    get:
      summary: List transactions
      parameters:
      - name: dateFrom
        in: query
        schema:
          type: string
          format: date
      - name: dateTo
        in: query
        schema:
          type: string
          format: date
      - name: type
        in: query
        schema:
          type: string
      - name: categoryId
        in: query
        schema:
          type: integer
      - name: incomeSourceId
        in: query
        schema:
          type: integer
      - name: paymentMethodId
        in: query
        schema:
          type: integer
      - name: tagId
        in: query
        schema:
          type: integer
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  total:
                    type: integer
                required:
                - items
                - total
        '400':
          description: Bad Request
        '428':
          description: Precondition Required
      operationId: getTransactions
    post:
      summary: Create transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                  - expense
                  - income
                date:
                  type: string
                  format: date
                amountCents:
                  type: integer
                categoryId:
                  type: integer
                incomeSourceId:
                  type: integer
                paymentMethodId:
                  type: integer
                note:
                  type: string
                tagIds:
                  type: array
                  items:
                    type: integer
              required:
              - type
              - date
              - amountCents
              - paymentMethodId
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '428':
          description: Precondition Required
      operationId: postTransactions
  /api/transactions/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Get transaction
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: getTransactionsId
    put:
      summary: Update transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                  - expense
                  - income
                date:
                  type: string
                  format: date
                amountCents:
                  type: integer
                categoryId:
                  type: integer
                incomeSourceId:
                  type: integer
                paymentMethodId:
                  type: integer
                note:
                  type: string
                tagIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: putTransactionsId
    delete:
      summary: Delete transaction
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: deleteTransactionsId
  /api/transactions/{id}/attachment:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Upload attachment
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: postTransactionsIdAttachment
    get:
      summary: Download attachment
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: getTransactionsIdAttachment
    delete:
      summary: Delete attachment
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: deleteTransactionsIdAttachment
  /api/categories:
    get:
      summary: List categories
      parameters:
      - name: includeArchived
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '400':
          description: Bad Request
        '428':
          description: Precondition Required
      operationId: getCategories
    post:
      summary: Create categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: &id001
                name:
                  type: string
                color:
                  type: string
                icon:
                  type: string
                sortOrder:
                  type: integer
              required:
              - name
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: postCategories
  /api/categories/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Update categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: *id001
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Not Found
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: putCategoriesId
    delete:
      summary: Hard delete categories
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: deleteCategoriesId
  /api/categories/{id}/archive:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Archive categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: postCategoriesIdArchive
  /api/categories/{id}/unarchive:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Unarchive categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: postCategoriesIdUnarchive
  /api/income-sources:
    get:
      summary: List income-sources
      parameters:
      - name: includeArchived
        in: query
        schema:
          type: boolean
      responses:
