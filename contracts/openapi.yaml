        '428':
          description: Precondition Required
      operationId: postTagsIdUnarchive
  /api/dashboard/years:
    get:
      summary: Available Years
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  years:
                    type: array
                    items:
                      type: object
                      properties:
                        year:
                          type: integer
                        hasData:
                          type: boolean
                        totals:
                          type: object
                          properties:
                            incomeCents:
                              type: integer
                            expenseCents:
                              type: integer
                            netCents:
                              type: integer
        '400':
          description: Bad Request
        '428':
          description: Precondition Required
      operationId: getDashboardYears
  /api/dashboard/annual:
    get:
      summary: Annual dashboard
      parameters:
      - name: year
        in: query
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  totals:
                    type: object
                    properties:
                      incomeCents:
                        type: integer
                      expenseCents:
                        type: integer
                      netCents:
                        type: integer
                  monthly:
                    type: array
                    items:
                      type: object
                      required:
                        - month
                        - incomeCents
                        - expenseCents
                        - netCents
                        - breakdowns
                      properties:
                        month:
                          type: integer
                        incomeCents:
                          type: integer
                        expenseCents:
                          type: integer
                        netCents:
                          type: integer
                        breakdowns:
                          type: object
                          required:
                            - byCategory
                            - byIncomeSource
                            - byPaymentMethod
                            - byTag
                          properties:
                            byCategory:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: integer
                                  amountCents:
                                    type: integer
                            byIncomeSource:
                              type: array
                              items:
                                type: object
                                required:
                                  - id
                                  - amountCents
                                properties:
                                  id:
                                    type: integer
                                  amountCents:
                                    type: integer
                            byPaymentMethod:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: integer
                                  amountCents:
                                    type: integer
                            byTag:
                              type: array
                              items:
                                type: object
                                properties:
