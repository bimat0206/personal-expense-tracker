      operationId: deleteTagsId
  /api/tags/{id}/archive:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Archive tags
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '404':
