      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: *id003
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '404':
          description: Not Found
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: putPayment-methodsId
    delete:
      summary: Hard delete payment-methods
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '409':
          description: Conflict
        '428':
          description: Precondition Required
      operationId: deletePayment-methodsId
  /api/payment-methods/{id}/archive:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Archive payment-methods
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: postPayment-methodsIdArchive
  /api/payment-methods/{id}/unarchive:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Unarchive payment-methods
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '404':
          description: Not Found
        '428':
          description: Precondition Required
      operationId: postPayment-methodsIdUnarchive
  /api/tags:
    get:
      summary: List tags
      parameters:
      - name: includeArchived
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '400':
          description: Bad Request
        '428':
