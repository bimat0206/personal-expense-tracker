      operationId: getTags
    post:
      summary: Create tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: &id004
                name:
                  type: string
                color:
                  type: string
                sortOrder:
                  type: integer
              required:
              - name
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '409':
