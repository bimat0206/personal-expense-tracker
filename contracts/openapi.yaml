        '428':
          description: Precondition Required
      operationId: postTags
  /api/tags/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Update tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: *id004
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '404':
          description: Not Found
        '409':
          description: Conflict
        '428':
