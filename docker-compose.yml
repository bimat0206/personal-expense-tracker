version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:3001:3001'
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3001
      - DATABASE_PATH=/app/data/expense-tracker.db
      - ATTACHMENTS_PATH=/app/data/attachments
      - TMP_IMPORTS_PATH=/app/data/tmp/imports
      - LOG_LEVEL=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:5173:80'
    depends_on:
      - backend
    restart: unless-stopped
